# Deploy Astro site to GitHub Pages
#
# Triggers:
#   - Push to `main` branch (production deploy)
#   - Manual trigger via GitHub UI (workflow_dispatch)
#
# Requirements (set once in repo Settings → Pages):
#   Source → "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # change to 'master' if that is your default branch
  workflow_dispatch:  # allows manual deploys from the GitHub UI

# Allow one concurrent deployment; cancel any in-progress run for the same ref.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions: read repo content, write to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ─── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check & build
        run: pnpm build
        # `pnpm build` runs `astro check && astro build` (see package.json)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # Astro's default output directory

  # ─── 2. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
