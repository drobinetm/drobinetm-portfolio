<section id="services" class="services">
    <div class="container">
        <div *ngIf="isLoading; else dataTemplate">
            <ngx-skeleton-loader count="1" appearance="line" animation="pulse" loadingText="Loading..."  [theme]="{width: '250px', left: '37%', marginTop: '20px', background: '#29323c'}"></ngx-skeleton-loader>
        </div>

        <ng-template #dataTemplate>
            <div class="section-title  text-lg-start">
                <div style="text-align: center !important;">
                    <span class="span-title"><i class="bi bi-code-slash"></i> My Services</span>
                </div>
                <div class="section-description section-description-glass">
                    <p>{{ this.services.description }}</p>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12 icon-box-container">
                    <div class="icon-box" style="height: 77%;">
                        <i class="bx bxl-dribbble"></i>
                        <h4 class="title">Backend</h4>
                        <p class="description">{{ this.services.backend }}</p>
                    </div>
                    <div class="icon-box">
                        <i class="bx bx-tachometer"></i>
                        <h4 class="title">DevOps</h4>
                        <p class="description">{{ this.services.devops }}</p>
                    </div>
                    <div class="icon-box" style="height: 77%;">
                        <i class="bx bx-file"></i>
                        <h4 class="title">Frontend</h4>
                        <p class="description">{{ this.services.frontend }}</p>
                    </div>
                </div>
            </div>
        </ng-template>
    </div>
</section>
