<section id="about" class="about section-panel-container">
    <div class="container">
        <div class="section-title text-lg-start">
            <span class="span-title"><i class="bi bi-person-circle"></i> About Me</span>
            <div class="section-description-container">
                <div class="section-image-description">
                    <img src="{{ about.imageUrl }}" class="img-fluid" alt="">
                </div>
                <div class="section-description">
                    <p>{{ about.description[0] }}</p>
                    <br>
                    <p>{{ about.description[1] }}</p>

                    <!--  Buttons -->
                    <div class="mt-4 mb-4">
                        <div class="text-center button-container">
                            <div class="button-container-border">
                                <a class="download-cv" href="{{ personal.cvUrl }}" target="_blank">
                                    <i class="bi bi-download"></i> Download CV
                                </a>
                            </div>
                            <div class="button-container-border">
                                <a class="hire-me" href="{{ personal.cvUrl }}" target="_blank">
                                    Hire Me
                                </a>
                                Available For Work
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!--  Skills -->
            <div class="col-lg-12 d-flex flex-column align-items-stretch">
                <div class="skills-content ps-lg-4 mt-3 mb-4">
                    <div class="row">
                        <div class="col-lg-3" *ngFor="let skill of skills; let i = index">
                            <div class="progress">
                                <span class="skill">{{ skill.name }}<i class="val">{{ skill.value }}%</i></span>
                                <div class="progress-bar-wrap">
                                    <div class="progress-bar" role="progressbar" [attr.aria-valuenow]="skill.value" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
